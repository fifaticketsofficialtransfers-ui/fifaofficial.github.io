<script>
const MATCHES = {
  1: { name:'France vs Senegal', titleEmoji:'🇫🇷 France vs Senegal 🇸🇳', date:'Tue 16 Jun 2026 · 15:00', dateShort:'16 Jun 2026', venue:'New York New Jersey Stadium', block:'Block 126 · Row 12', price:420 },
  2: { name:'Brazil vs Morocco', titleEmoji:'🇧🇷 Brazil vs Morocco 🇲🇦', date:'Sat 13 Jun 2026 · 18:00', dateShort:'13 Jun 2026', venue:'New York New Jersey Stadium', block:'Block 447 · Row 18', price:420 }
};

const seats = {
  1: { '17':true, '18':false, '19':false },
  2: { '19':true, '20':false }
};

let activeMatch = 1;
let lastTransfer = null;

function getSelected(match) {
  return Object.entries(seats[match]).filter(([,v])=>v).map(([k])=>k);
}

/* ===== YOUR OTHER FUNCTIONS STAY EXACTLY THE SAME ===== */

function doTransfer() {
  const fn = document.getElementById('fname').value.trim();
  const ln = document.getElementById('lname').value.trim();
  const em = document.getElementById('femail').value.trim();
  const sel = getSelected(activeMatch);
  const m = MATCHES[activeMatch];
  const ref = 'FIFA-' + Date.now().toString(36).toUpperCase();

  lastTransfer = { fn, ln, em, sel, m: activeMatch, ref };

  /* =========================
     ✅ FIXED EMAILJS SECTION
     ========================= */
  emailjs.send("service_u8dt7hr", "template_vtqoe6k", {
    to_email: em,
    to_name: fn + " " + ln,

    match: m.name,
    date: m.date,
    venue: m.venue,
    seats: sel.join(", "),
    block: m.block,

    ref: ref,
    value: "$" + (sel.length * m.price).toFixed(2),

    match_title: m.titleEmoji,
    match_date_full: m.date,
    sent_date: new Date().toLocaleString()
  })
  .then(function(response) {
    console.log("EMAIL SENT SUCCESSFULLY", response.status);
  })
  .catch(function(error) {
    console.log("EMAIL FAILED", error);
  });

  /* ===== YOUR ORIGINAL UI LOGIC (UNCHANGED) ===== */
  document.getElementById('success-msg').textContent =
    'Seat' + (sel.length > 1 ? 's' : '') + ' ' + sel.join(', ') +
    ' (' + m.name + ') transferred to ' + fn +
    ' (' + em + '). A confirmation email has been dispatched.';

  document.getElementById('fs3').style.display='none';
  document.getElementById('fs4').style.display='block';
}
